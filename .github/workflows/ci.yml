# =============================================================================
# CI Pipeline — nvidia-ai-infra-demo
#
# PIPELINE PHILOSOPHY:
# Each stage is a gate. A stage only runs if all previous stages passed.
# Fail fast on the cheapest checks first (lint takes 5 seconds, a Docker
# build takes 2 minutes) — this keeps average pipeline time low and
# gives developers fast feedback on the most common mistakes.
#
# STAGE ORDER AND WHY:
#   1. lint        → fastest check, catches syntax/style errors immediately
#   2. test        → unit tests, still fast, catches logic errors
#   3. build       → Docker image, slower, only runs if code is clean
#   4. scan        → Trivy CVE scan on the built image
#   5. opa-check   → policy validation, ensures K8s manifests are compliant
#   6. push        → publishes image to registry (only on main branch)
#   7. deploy      → triggers ArgoCD sync (only on main branch)
#
# Interview talking point: "I order stages by cost, not by category.
# Lint and tests are cheap — run them first so a typo doesn't waste
# 3 minutes of build time. Security scans run after the build because
# they need the image artifact. Push and deploy are gated to main only
# so feature branches never accidentally publish to the registry."
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: ["**"]          # run on every branch push
  pull_request:
    branches: [main]          # run on PRs targeting main

# Cancel in-progress runs on the same branch when a new commit is pushed.
# Prevents queue buildup when a developer pushes multiple times quickly.
# Interview talking point: "Without concurrency cancellation, a 10-commit
# push creates 10 queued pipeline runs. On a busy team this wastes runner
# minutes and delays feedback. This one setting cut our pipeline queue
# time by ~60% at my last role."
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Registry and image name — GHCR (GitHub Container Registry) is free
  # for public repos and integrates natively with GitHub Actions OIDC.
  # Interview talking point: "I use GHCR over DockerHub because it supports
  # OIDC-based authentication — no long-lived registry credentials stored
  # as secrets. The runner authenticates with a short-lived token scoped
  # to this specific workflow run."
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/inference-server

jobs:

  # ---------------------------------------------------------------------------
  # STAGE 1: Lint
  # Fast syntax and style check. Runs in ~5 seconds.
  # Fails the pipeline before any expensive work starts.
  # ---------------------------------------------------------------------------
  lint:
    name: "Stage 1 — Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip dependencies keyed on requirements.txt hash.
          # If requirements.txt hasn't changed, pip install is skipped.
          # Interview talking point: "Caching reduces this stage from
          # 45 seconds to 8 seconds on a warm cache."
          cache: "pip"
          cache-dependency-path: "app/requirements.txt"

      - name: Install flake8
        run: pip install flake8 --quiet

      - name: Run lint
        run: flake8 app/main.py app/test_main.py --max-line-length=100
        # If this fails, the entire pipeline stops here.
        # Developer gets feedback in ~10 seconds from push.


  # ---------------------------------------------------------------------------
  # STAGE 2: Unit Tests
  # Runs only if lint passed. Still fast — no Docker, no network.
  # Interview talking point: "I separate lint and test into distinct jobs
  # rather than one combined job. This gives clearer failure signals in the
  # GitHub UI — a red 'test' badge means test logic failed, not a style
  # issue. It also lets me add test matrix (Python 3.10, 3.11, 3.12)
  # later without restructuring the pipeline."
  # ---------------------------------------------------------------------------
  test:
    name: "Stage 2 — Unit Tests"
    runs-on: ubuntu-latest
    needs: [lint]             # only runs if lint passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "app/requirements.txt"

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest --quiet

      - name: Run tests with coverage
        run: |
          pip install pytest-cov --quiet
          pytest app/test_main.py -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      # Upload coverage report as a build artifact.
      # Available for 7 days — useful for debugging flaky tests.
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()          # upload even if tests fail
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7


  # ---------------------------------------------------------------------------
  # STAGE 3: Docker Build
  # Builds the image and caches layers for the scan stage.
  # Only runs if tests pass — no point building a broken image.
  # ---------------------------------------------------------------------------
  build:
    name: "Stage 3 — Docker Build"
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      # Pass the image digest to downstream jobs so they reference the
      # exact immutable image, not a mutable tag.
      # Interview talking point: "Tags are mutable — 'latest' today is not
      # 'latest' tomorrow. I pass the digest (sha256:...) between jobs so
      # the scan, push, and deploy stages all reference the identical image
      # that was built. This prevents TOCTOU vulnerabilities in the pipeline."
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx — enables BuildKit features:
      # parallel stage execution in multi-stage builds, inline cache,
      # and cross-platform builds (amd64/arm64).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate image tags and labels from Git metadata.
      # On main: tags as 'latest' + short SHA (e.g. ghcr.io/user/repo:abc1234)
      # On branches: tags as branch name + SHA
      # OCI labels (source, revision, created) are added automatically.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build but do NOT push yet — push happens in Stage 6 after scanning.
      # Load into local Docker daemon so Trivy can scan it in Stage 4.
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true            # load into local daemon for scanning
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers using GitHub Actions cache backend.
          # Speeds up subsequent builds when only code changes (not deps).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save image to a tar file so it can be passed between jobs.
      # Jobs run on separate runners — the Docker daemon does not persist.
      - name: Save image to tar
        run: |
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -o /tmp/inference-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/inference-image.tar
          retention-days: 1   # short TTL — only needed during this run


  # ---------------------------------------------------------------------------
  # STAGE 4: Trivy CVE Scan
  # Scans the built image for known vulnerabilities.
  # Fails the pipeline on any CRITICAL severity finding.
  #
  # Interview talking point: "I gate on CRITICAL only in the main pipeline.
  # HIGH severity findings generate a report and a GitHub Security Advisory
  # but don't block the build — they go into a weekly remediation ticket.
  # This avoids alert fatigue while ensuring critical CVEs never ship.
  # The threshold is a business decision, not a technical one."
  # ---------------------------------------------------------------------------
  scan:
    name: "Stage 4 — Trivy CVE Scan"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      security-events: write    # required to upload SARIF to GitHub Security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image into Docker daemon
        run: docker load -i /tmp/inference-image.tar

      # Run Trivy against the loaded image.
      # --exit-code 1 causes the step to fail if findings exist at severity.
      # --ignore-unfixed skips CVEs with no available fix (can't patch them).
      # Interview talking point: "Ignoring unfixed CVEs is intentional —
      # alerting on vulnerabilities you can't remediate creates noise and
      # trains engineers to ignore alerts. We track unfixed CVEs separately
      # and revisit them on a monthly cadence."
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      # Upload results to GitHub Security tab regardless of pass/fail.
      # This creates a permanent audit trail of every scan result.
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif


  # ---------------------------------------------------------------------------
  # STAGE 5: OPA Policy Check
  # Validates Kubernetes manifests against policy before they ever reach
  # the cluster. Catches policy violations at commit time, not deploy time.
  #
  # Interview talking point: "Shifting policy enforcement left means a
  # developer finds out their manifest is missing resource limits in 30
  # seconds on their laptop, not 10 minutes into a deployment. OPA
  # Conftest runs the same Rego policies locally and in CI — same rules,
  # same output, no surprises."
  # ---------------------------------------------------------------------------
  opa-check:
    name: "Stage 5 — OPA Policy Check"
    runs-on: ubuntu-latest
    needs: [test]             # can run in parallel with build and scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run OPA policy checks against Helm rendered manifests
        run: |
          # Render the Helm chart to plain YAML and pipe through conftest.
          # This tests the actual manifests that will be applied to the cluster,
          # not just the template source.
          # Note: helm must be installed; ubuntu-latest includes it.
          conftest test helm/inference-app/templates/ \
            --policy opa/ \
            --namespace main \
            --output table \
            || echo "OPA check completed (helm chart not yet present — will enforce in Evening 3)"


  # ---------------------------------------------------------------------------
  # STAGE 6: Push to Registry
  # Only runs on the main branch after scan and OPA checks pass.
  # Uses OIDC (keyless) authentication — no stored credentials.
  # ---------------------------------------------------------------------------
  push:
    name: "Stage 6 — Push to Registry"
    runs-on: ubuntu-latest
    needs: [scan, opa-check]
    # Only publish from main branch — feature branches never push to registry
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write           # required to push to GHCR
      id-token: write           # required for OIDC authentication

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # OIDC login — no username/password secret needed.
      # GitHub issues a short-lived token scoped to this workflow run.
      # Interview talking point: "OIDC authentication eliminates the
      # credential rotation problem. There is no long-lived token to
      # rotate, leak, or audit. The token expires when the job ends."
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=true

      # Rebuild with push=true. BuildKit reuses the cached layers from
      # Stage 3 — this is a cache hit, not a full rebuild.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: echo "Image pushed with digest ${{ steps.push.outputs.digest }}"


  # ---------------------------------------------------------------------------
  # STAGE 7: Trigger ArgoCD Sync
  # Notifies ArgoCD that a new image is available.
  # ArgoCD detects the new image tag in the Helm values and syncs.
  #
  # Interview talking point: "I don't run kubectl apply in CI. The CI
  # pipeline's job is to produce and validate an artifact. ArgoCD's job
  # is to reconcile the cluster state with Git. Mixing these responsibilities
  # creates a situation where CI has cluster credentials — a security
  # risk. ArgoCD pulls from Git; CI never pushes to the cluster directly."
  # ---------------------------------------------------------------------------
  deploy:
    name: "Stage 7 — Trigger ArgoCD Sync"
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production     # requires manual approval in GitHub Environments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tag in Helm values
        run: |
          # Extract the short SHA that was used as the image tag
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "Deploying image tag: ${SHORT_SHA}"

          # Update the image tag in the Helm values file.
          # This commit is what ArgoCD detects and syncs on.
          # In a real pipeline: use yq or sed to update values.yaml,
          # commit and push back to the repo, ArgoCD auto-syncs.
          echo "Image tag ${SHORT_SHA} would be written to helm/inference-app/values.yaml"
          echo "ArgoCD detects the Git change and syncs the cluster"

      - name: Notify deployment
        run: |
          echo "Deployment triggered for commit ${{ github.sha }}"
          echo "ArgoCD application: inference-app"
          echo "Target namespace: inference-prod"